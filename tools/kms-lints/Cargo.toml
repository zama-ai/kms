[workspace]
members = ["common", "lints"]
resolver = "3"

[workspace.dependencies]
dylint_linting = "5.0.0" # Dylint helper crate; required for custom lint libraries and follows the existing tfhe-lints convention.
serde = { version = "1.0", features = ["derive"] } # Serialization for generated JSON inventory; maintained by dtolnay and already used across KMS.
serde_json = "1.0" # JSON output for generated inventories; maintained by dtolnay and already used across KMS.
