[package]
name = "generate-test-material"
description = "Pre-generates test material for KMS tests"
version.workspace = true
edition.workspace = true
publish.workspace = true
authors.workspace = true
license.workspace = true
readme = "README.md"
# Inherited from repository root Cargo.toml

[[bin]]
name = "generate-test-material"
path = "src/main.rs"

[dependencies]
# TODO: once `vault` is its own crate and we have sorted out the `non-wasm` mess, this tool should not need to compile
# all of `kms` to generate keys.
# Core KMS dependencies
kms = { path = "../../core/service", features = ["testing", "non-wasm"] }
# This shouldn't be needed but without it the wasm-build breaks because features.
threshold-fhe = { workspace = true, features = ["testing"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# CLI and configuration
clap = { workspace = true, features = ["derive"] }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Error handling
anyhow = { workspace = true }

# Path utilities
path-absolutize = "3.0"
