            rust_log_level: 'error'
            nextest_threads: '3'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          #======================================================================
    uses: ./.github/workflows/common-testing.yml
    with:
      crate-names: ${{ matrix.crate_names }}
      args-tests: ${{ matrix.args_tests }}
      run-minio: ${{ matrix.run_minio }}
      run-redis: ${{ matrix.run_redis }}
      skip-test-material: ${{ matrix.skip_test_material }}
      lfs: ${{ matrix.lfs }}
      runs-on: ${{ matrix.runs_on }}
      runner-volume: ${{ matrix.runner_volume }}
      rust-log-level: ${{ matrix.rust_log_level }}
      nextest-test-threads: ${{ matrix.nextest_threads }}
      efs-test-material-path: ${{ matrix.efs-test-material-path }}
    secrets: inherit

  test-reporter:
    name: new_main/test-reporter
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [test-matrix]
    uses: ./.github/workflows/test-reporter.yml
    permissions:
      checks: write
      packages: read
      issues: write
      pull-requests: write
      actions: read
      contents: read
    secrets: inherit
