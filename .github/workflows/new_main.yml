          #======================================================================
          - job_name: core-service-test-p1
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:1/4 -- --skip threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
