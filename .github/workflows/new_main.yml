name: new_main

on:
  schedule:
    - cron: '0 0 * * 1-5'
  pull_request:
  push:
    branches: ['main', 'release/*']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read
  packages: read

jobs:
  generate-test-material:
    name: new_main/generate-test-material
    permissions:
      checks: write
      packages: read
      issues: write
      pull-requests: write
      actions: read
      contents: read
    outputs:
      efs-test-material-path: ${{ steps.generate-test-material.outputs.efs-test-material-path }}
    runs-on: runs-on=${{ github.run_id }}/runner=64cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache+efs
    steps:
      - name: Setup Runs-on
        uses: runs-on/action@cd2b598b0515d39d78c38a02d529db87d2196d1e # v2.0.3
        with:
          metrics: cpu,network,memory,disk,io

      - name: Checkout Project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      ############################################################################
      # Rust toolchain setup
      #
      - name: Set up Rust and Protoc
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}
          rust-components: llvm-tools-preview, llvm-tools
          rust-cache: "false"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          # Keep a stable workspace->target mapping for this monorepo layout.
          workspaces: |
            . -> target
          # Share cache across jobs/workflows that build the same dependency set.
          shared-key: kms-rust
          # Temporary policy for cache validation:
          # save on main and on internal PRs (not forks).
          save-if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}

      - name: Generate Test Material
        id: generate-test-material
        env:
          EFS_ROOT: /mnt/efs/test-material
        run: |
          df -T
          READY_FILE="${EFS_ROOT}/ready"
          mkdir -p "${EFS_ROOT}"
          if [ -f "${READY_FILE}" ]; then
            echo "Reusing existing test material at ${EFS_ROOT}"
          else
            # Build the generator in Cargo's built-in `test` profile so later
            # test jobs can reuse more compiled artifacts from the rust cache.
            echo "EXECUTING: cargo run --profile test -p generate-test-material -- --output ${EFS_ROOT} --verbose --profile insecure,secure --parties 4,13"
            cargo run --profile test -p generate-test-material -- --output "${EFS_ROOT}" --verbose --profile insecure,secure --parties 4,13
            touch "${READY_FILE}"
          fi

          du -sh "${EFS_ROOT}" || true
          echo "efs-test-material-path=${EFS_ROOT}" >> "$GITHUB_OUTPUT"

  test-matrix:
    name: new_main/${{ matrix.job_name }}
    needs: [generate-test-material]
    permissions:
      checks: write
      packages: read
      issues: write
      pull-requests: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core client - aggressively sharded.
          - job_name: core-client-threshold-p1
            crate_names: '-p kms-core-client'
            args_tests: '--features threshold_tests --partition count:1/3 -- threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip centralized --skip isolated_test_example --skip test_threshold_mpc_context_switch_6_docker --skip test_threshold_insecure'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          - job_name: core-client-threshold-p2
            crate_names: '-p kms-core-client'
            args_tests: '--features threshold_tests --partition count:2/3 -- threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip centralized --skip isolated_test_example --skip test_threshold_mpc_context_switch_6_docker --skip test_threshold_insecure'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          - job_name: core-client-threshold-p3
            crate_names: '-p kms-core-client'
            args_tests: '--features threshold_tests --partition count:3/3 -- threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip centralized --skip isolated_test_example --skip test_threshold_mpc_context_switch_6_docker --skip test_threshold_insecure'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          #======================================================================
          - job_name: core-client-centralized-p1
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:1/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          - job_name: core-client-centralized-p2
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:2/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          - job_name: core-client-centralized-p3
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:3/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
            efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
          #======================================================================
          - job_name: core-client-unit-p1
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:1/3 -- --skip centralized --skip threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
