name: wasm-testing

on:
  workflow_call:
    inputs:
      skip-test-material:
        # When true, skip test-material generation and the kms-custodian
        # build. Useful for light unit-test-only jobs on crates that don't
        # need integration test fixtures.
        type: boolean
        required: false
        default: false
      efs-test-material-path:
        # Optional absolute path to pre-generated test material on EFS.
        # Example: /mnt/efs/kms-test-material/<generator-hash>/insecure_4_10
        # (the hash keys the generator inputs; the leaf dir names the material
        # set). When provided, this workflow links ./test-material to that path.
        type: string
        required: false
        default: ''
    secrets:
      BLOCKCHAIN_ACTIONS_TOKEN:
        required: true

env:
  NPM_TAG: 'test'

# No top-level permissions needed - job-level permissions are more specific
permissions: {}

jobs:
  wasm-testing:
    name: wasm-testing
    permissions:
      checks: write # Required to create GitHub checks for test results
      packages: read # Required to read GitHub packages/container registry
      pull-requests: write # Required to create comments on pull requests
      actions: read # Required to read workflow run information and download artifacts
      contents: read # Required to checkout repository code
    timeout-minutes: 500

    # Long-form runs-on label. The short form (e.g. `16cpu-linux-x64`) only
    # works as an *input* to common-testing.yml, but we cannot use it in this
    # job since we're doing non-standard testing.
    runs-on: runs-on=${{ github.run_id }}/runner=16cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache+efs

    steps:
      - name: Setup Runs-on
        uses: runs-on/action@cd2b598b0515d39d78c38a02d529db87d2196d1e # v2.0.3
        with:
          metrics: cpu,network,memory,disk,io

      - name: Checkout Project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          token: ${{ secrets.BLOCKCHAIN_ACTIONS_TOKEN }}
          persist-credentials: true

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Rust and Protoc
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}

      # WASM handling
      - name: Install
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Build the same artifact that gets published (no `wasm_tests`): the JS tests load a
      # stable JSON vector and only exercise the stable public API, so the transcript helpers
      # are not needed in the wasm package.
      - name: Build wasm
        working-directory: ./core/service
        run: wasm-pack build --target nodejs . --no-default-features

      - name: Install node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 24.16.0

      # Generate the insecure test material set for parties 4, 10.
      - name: Generate Test Material
        id: generate-test-material
        env:
          # Distinct leaf dir from the `insecure_secure_4_13` set used by
          # parallel-testing.yml: the set name + hash prefix keep the two from
          # colliding on a shared path or `ready` flag (see parallel-testing.yml).
          MATERIAL_PROFILE: insecure
          MATERIAL_PARTIES: 4,10
          MATERIAL_SET_NAME: insecure_4_10
        run: |
          df -T
          KEY="$(git rev-parse "HEAD:core" "HEAD:tools/generate-test-material" "HEAD:Cargo.lock" | sha256sum | cut -c1-16)"
          BASE="/mnt/efs/kms-test-material/${KEY}"
          EFS_ROOT="${BASE}/${MATERIAL_SET_NAME}"
          READY_FILE="${EFS_ROOT}/ready"
          mkdir -p "${BASE}"

          if [ -f "${READY_FILE}" ]; then
            echo "Reusing existing test material at ${EFS_ROOT}"
          else
            # Generate into a temp dir, then publish-if-absent via atomic
            # `mv -T` (see parallel-testing.yml for the full rationale). We
            # never overwrite an existing EFS_ROOT, so a concurrent first-time
            # run only wastes work; it can't clobber a live directory.
            TMP_DIR="$(mktemp -d "${BASE}/.tmp.XXXXXX")"
            trap 'rm -rf "${TMP_DIR}"' EXIT
            echo "EXECUTING: cargo run -p generate-test-material -- --output ${TMP_DIR} --verbose --profile ${MATERIAL_PROFILE} --parties ${MATERIAL_PARTIES}"
            cargo run -p generate-test-material -- --output "${TMP_DIR}" --verbose --profile "${MATERIAL_PROFILE}" --parties "${MATERIAL_PARTIES}"
            touch "${TMP_DIR}/ready"
            if mv -T "${TMP_DIR}" "${EFS_ROOT}" 2>/dev/null; then
              echo "Published test material to ${EFS_ROOT}"
            else
              echo "Another run already published ${EFS_ROOT}; keeping it and discarding our copy"
            fi
          fi

          du -sh "${EFS_ROOT}" || true
          echo "efs-test-material-path=${EFS_ROOT}" >> "$GITHUB_OUTPUT"

      - name: Link pre-generated test material from EFS
        env:
          EFS_TEST_MATERIAL_PATH: ${{ steps.generate-test-material.outputs.efs-test-material-path }}
        run: |
          if [ ! -d "${EFS_TEST_MATERIAL_PATH}" ]; then
            echo "::error::EFS test material path does not exist: ${EFS_TEST_MATERIAL_PATH}"
            exit 1
          fi

          rm -rf ./test-material
          ln -s "${EFS_TEST_MATERIAL_PATH}" ./test-material
          echo "Linked ./test-material -> ${EFS_TEST_MATERIAL_PATH}"
          du -shL ./test-material || true

      - name: Generate wasm test files
        working-directory: ./core/service
        run: |
          cargo test test_user_decryption_threshold_and_write_transcript -F wasm_tests --lib
          cargo test test_user_decryption_centralized_and_write_transcript -F wasm_tests --lib

      - name: Test wasm
        # Run from inside the test dir so `node --test` searches cwd recursively.
        # Newer Node (>= 23) treats a positional dir arg as a file to load rather
        # than a directory to glob, so `node --test tests/js` fails there.
        working-directory: ./core/service/tests/js
        run: node --test

      # NPM package handling
      - name: Set NPM version tag to latest
        if: ${{ !github.event.release.prerelease }}
        run: |
          echo "NPM_TAG=latest" >> "${GITHUB_ENV}"

      - name: Set NPM version tag to prerelease
        if: ${{ github.event.release.prerelease }}
        run: |
          echo "NPM_TAG=prerelease" >> "${GITHUB_ENV}"

      # Node package build and publish
      - name: NPM build node package
        working-directory: ./core/service
        run: |
          rm -rf pkg
          wasm-pack build --target nodejs . --no-default-features
          sed -i 's/"kms"/"node-tkms"/g' pkg/package.json
          echo "# node-tkms" > pkg/README.md

      - name: NPM publish Node package
        uses: JS-DevTools/npm-publish@7f8fe47b3bea1be0c3aec2b717c5ec1f3e03410b # v4.1.1
        with:
          package: ./core/service/pkg/package.json
          dry-run: true
          provenance: true
          tag: ${{ env.NPM_TAG }}

      # Web package build and publish
      - name: NPM build web package
        working-directory: ./core/service
        run: |
          rm -rf pkg
          wasm-pack build --target web . --no-default-features
          sed -i 's/"kms"/"tkms"/g' pkg/package.json
          echo "# tkms" > pkg/README.md

      - name: NPM publish web package
        uses: JS-DevTools/npm-publish@7f8fe47b3bea1be0c3aec2b717c5ec1f3e03410b # v4.1.1
        with:
          package: ./core/service/pkg/package.json
          dry-run: true
          provenance: true
          tag: ${{ env.NPM_TAG }}

      - name: Remove aws credentials file
        run: |
          rm -rf ~/.aws
