name: fs-probe

# One-shot diagnostic: report the filesystem the test-core-* runner gets so we
# know whether reflinks/CoW are available without touching the AMI. Auto-fires
# on every push to this branch only — branch is throwaway, so is this trigger.
on:
  push:
    branches:
      - dvdplm/chore/figure-out-ci-runner-fs-stuff

permissions: {}

jobs:
  probe:
    name: fs-probe
    permissions:
      contents: read
    runs-on: runs-on=${{ github.run_id }}/runner=64cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache
    steps:
      - name: Setup Runs-on
        uses: runs-on/action@cd2b598b0515d39d78c38a02d529db87d2196d1e # v2.0.3

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Probe filesystems
        shell: bash
        run: |
          set +e  # don't fail the job on any single missing tool
          echo "=== uname / distro ==="
          uname -a
          (. /etc/os-release && echo "$PRETTY_NAME") || true

          echo
          echo "=== mounts of interest ==="
          for p in / /tmp "$RUNNER_TEMP" "$GITHUB_WORKSPACE" /home /mnt; do
            [ -e "$p" ] && findmnt -no TARGET,SOURCE,FSTYPE,OPTIONS --target "$p" \
              | sed "s|^|$p -> |"
          done

          echo
          echo "=== df -hT ==="
          df -hT

          echo
          echo "=== xfs reflink probe ==="
          for p in / /tmp "$RUNNER_TEMP" "$GITHUB_WORKSPACE"; do
            [ -e "$p" ] || continue
            fs=$(findmnt -no FSTYPE --target "$p")
            if [ "$fs" = "xfs" ]; then
              src=$(findmnt -no SOURCE --target "$p")
              echo "--- xfs_info on $p ($src) ---"
              sudo xfs_info "$p" 2>/dev/null || xfs_info "$p" 2>/dev/null || echo "xfs_info failed"
            fi
          done

          echo
          echo "=== live reflink test ==="
          # Tries an actual reflink copy in each candidate dir. If reflink works,
          # cp returns 0 with --reflink=always; otherwise it errors.
          for p in /tmp "$RUNNER_TEMP" "$GITHUB_WORKSPACE"; do
            [ -d "$p" ] || continue
            d=$(mktemp -d "$p/reflink-probe.XXXXXX") || continue
            dd if=/dev/zero of="$d/src" bs=1M count=16 status=none
            if cp --reflink=always "$d/src" "$d/dst" 2>/dev/null; then
              echo "REFLINK OK: $p ($(findmnt -no FSTYPE --target "$p"))"
            else
              echo "REFLINK NO: $p ($(findmnt -no FSTYPE --target "$p"))"
            fi
            rm -rf "$d"
          done

          echo
          echo "=== sudo + capabilities sanity ==="
          sudo -n true && echo "passwordless sudo: yes" || echo "passwordless sudo: no"
          id

          echo
          echo "=== fuse / overlay availability ==="
          command -v fuse-overlayfs && fuse-overlayfs --version || echo "fuse-overlayfs: not installed"
          [ -e /dev/fuse ] && echo "/dev/fuse: present" || echo "/dev/fuse: absent"
          grep -E '(^|[[:space:]])overlay($|[[:space:]])' /proc/filesystems || true

      # ---------------------------------------------------------------------
      # The four comparisons we actually care about:
      #   1. ext4 single cp                  (today's CI baseline)
      #   2. ext4 6× sequential cp           (today's 6-thread fan-out)
      #   3. btrfs loopback single reflink cp
      #   4. btrfs loopback 6× reflink cp
      # All against a 1 GiB random source. Page cache dropped before each
      # measurement so we're comparing cold-cache cost. `time` output is
      # redirected to stdout via `{ ...; } 2>&1` so each timing prints
      # immediately after its own header — no more cross-step interleaving.
      # ---------------------------------------------------------------------
      - name: Install btrfs-progs
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq btrfs-progs

      - name: Benchmark ext4 byte-cp vs btrfs loopback reflink-cp
        shell: bash
        run: |
          set -e
          SRC_GB=1
          EXT4_DIR="$RUNNER_TEMP/ext4-bench"
          BTRFS_IMG=/tmp/btrfs-scratch.img
          BTRFS_MNT=/mnt/btrfs-scratch

          # === Setup ===
          mkdir -p "$EXT4_DIR"
          dd if=/dev/urandom of="$EXT4_DIR/big.bin" bs=1M count=$((SRC_GB * 1024)) status=none

          truncate -s 20G "$BTRFS_IMG"
          mkfs.btrfs -q "$BTRFS_IMG"
          sudo mkdir -p "$BTRFS_MNT"
          sudo mount -o loop "$BTRFS_IMG" "$BTRFS_MNT"
          sudo chown "$USER" "$BTRFS_MNT"
          # Seed btrfs source with the same bytes (paid once, not measured).
          cp "$EXT4_DIR/big.bin" "$BTRFS_MNT/big.bin"

          set +e  # benchmark errors should not fail the job

          drop_caches() { sync; echo 3 | sudo tee /proc/sys/vm/drop_caches >/dev/null; }

          echo "=================================================================="
          echo " Source size: ${SRC_GB} GiB"
          echo " ext4  src: $EXT4_DIR/big.bin   ($(findmnt -no FSTYPE --target "$EXT4_DIR"))"
          echo " btrfs src: $BTRFS_MNT/big.bin  ($(findmnt -no FSTYPE --target "$BTRFS_MNT"))"
          echo "=================================================================="

          drop_caches
          echo "--- [1/4] ext4 single cp (today's CI baseline) ---"
          { time cp "$EXT4_DIR/big.bin" "$EXT4_DIR/big.cp.1"; } 2>&1

          drop_caches
          echo "--- [2/4] ext4 6× sequential cp (today's 6-thread fan-out) ---"
          { time for i in 1 2 3 4 5 6; do cp "$EXT4_DIR/big.bin" "$EXT4_DIR/big.cp.s$i"; done; } 2>&1

          drop_caches
          echo "--- [3/4] btrfs loopback single reflink cp ---"
          { time cp --reflink=always "$BTRFS_MNT/big.bin" "$BTRFS_MNT/big.cp.1"; } 2>&1

          drop_caches
          echo "--- [4/4] btrfs loopback 6× reflink cp ---"
          { time for i in 1 2 3 4 5 6; do cp --reflink=always "$BTRFS_MNT/big.bin" "$BTRFS_MNT/big.cp.s$i"; done; } 2>&1

          echo
          echo "=== disk usage after ==="
          echo "ext4 (only the bench dir):"
          du -sh "$EXT4_DIR"
          echo "btrfs mount:"
          df -h "$BTRFS_MNT"

          # === Cleanup ===
          sudo umount "$BTRFS_MNT"
          sudo rmdir "$BTRFS_MNT"
          rm -f "$BTRFS_IMG"
          rm -rf "$EXT4_DIR"
