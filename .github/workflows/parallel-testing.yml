name: parallel-testing

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {} # No permissions required for this workflow

jobs:
  generate-test-material:
    name: parallel-testing/generate-test-material
    permissions:
      checks: write # Required to write to the GitHub Actions check suite
      packages: read # Required to read from the GitHub Packages registry
      issues: write # Required to write to the GitHub Issues API
      pull-requests: write # Required to write to the GitHub Pull Requests API
      actions: read # Required to read the GitHub Actions API
      contents: read # Required to read the GitHub Contents API
    outputs:
      efs-test-material-path: ${{ steps.generate-test-material.outputs.efs-test-material-path }}
    runs-on: runs-on=${{ github.run_id }}/runner=64cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache+efs
    steps:
      - name: Setup Runs-on
        uses: runs-on/action@cd2b598b0515d39d78c38a02d529db87d2196d1e # v2.0.3
        with:
          metrics: cpu,network,memory,disk,io

      - name: Checkout Project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      ############################################################################
      # Rust toolchain setup
      #
      - name: Set up Rust and Protoc
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}
          rust-components: llvm-tools-preview, llvm-tools
          rust-cache: "false"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          # Share cache across jobs/workflows that build the same dependency set.
          shared-key: kms-rust
          # Save on main and on internal (non-fork) PRs so PR branches get a
          # warm cache; forks can't write to the cache anyway.
          save-if: ${{ github.ref == 'refs/heads/main' || github.event.pull_request.head.repo.fork == false }}

      - name: Generate Test Material
        id: generate-test-material
        env:
          # One leaf dir per material set. MATERIAL_SET_NAME encodes the
          # `--profile`/`--parties` combo so distinct sets (e.g. wasm's
          # `insecure 4,10`) never share a path or a `ready` flag with this
          # one. The hash prefix (computed below from the generator-relevant
          # sources + args) makes a changed generator/crypto produce a fresh
          # path instead of silently reusing stale material across branches.
          MATERIAL_PROFILE: insecure,secure
          MATERIAL_PARTIES: 4,13
          MATERIAL_SET_NAME: insecure_secure_4_13
        run: |
          df -T
          KEY="$(git rev-parse "HEAD:core" "HEAD:tools/generate-test-material" "HEAD:Cargo.lock" | sha256sum | cut -c1-16)"
          BASE="/mnt/efs/kms-test-material/${KEY}"
          EFS_ROOT="${BASE}/${MATERIAL_SET_NAME}"
          READY_FILE="${EFS_ROOT}/ready"
          mkdir -p "${BASE}"

          if [ -f "${READY_FILE}" ]; then
            echo "Reusing existing test material at ${EFS_ROOT}"
          else
            # Generate into a private temp dir, then publish-if-absent: the
            # `mv -T` renames it into place with a single atomic rename on the
            # same EFS filesystem, and only succeeds when EFS_ROOT does not
            # already exist (rename onto a non-empty dir fails). `ready` is
            # written inside *before* the move, so consumers never observe a
            # partial directory. We never overwrite an existing EFS_ROOT, so a
            # concurrent first-time run can only waste work; it cannot clobber
            # material another run is already reading. The READY_FILE check
            # above handles all later reuse.
            TMP_DIR="$(mktemp -d "${BASE}/.tmp.XXXXXX")"
            trap 'rm -rf "${TMP_DIR}"' EXIT
            # Build the generator in Cargo's built-in `test` profile so later
            # test jobs can reuse more compiled artifacts from the rust cache.
            echo "EXECUTING: cargo run --profile test -p generate-test-material -- --output ${TMP_DIR} --verbose --profile ${MATERIAL_PROFILE} --parties ${MATERIAL_PARTIES}"
            cargo run --profile test -p generate-test-material -- --output "${TMP_DIR}" --verbose --profile "${MATERIAL_PROFILE}" --parties "${MATERIAL_PARTIES}"
            touch "${TMP_DIR}/ready"
            if mv -T "${TMP_DIR}" "${EFS_ROOT}" 2>/dev/null; then
              echo "Published test material to ${EFS_ROOT}"
            else
              echo "Another run already published ${EFS_ROOT}; keeping it and discarding our copy"
            fi
          fi

          du -sh "${EFS_ROOT}" || true
          echo "efs-test-material-path=${EFS_ROOT}" >> "$GITHUB_OUTPUT"

  test-matrix:
    name: parallel-testing/${{ matrix.job_name }}
    needs: [generate-test-material]
    permissions:
      checks: write # Required to write to the GitHub Actions check suite
      packages: read # Required to read from the GitHub Packages registry
      issues: write # Required to write to the GitHub Issues API
      pull-requests: write # Required to write to the GitHub Pull Requests API
      actions: read # Required to read the GitHub Actions API
      contents: read # Required to read the GitHub Contents API
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core client - threshold tests. Built with `slow_tests` so the heavy
          # threshold tests (insecure, default preproc-keygen, 6-party context
          # switch) run per-PR.
          - job_name: core-client-threshold
            crate_names: '-p kms-core-client'
            args_tests: '--features slow_tests -- threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip isolated_test_example --skip test_threshold_mpc_context_switch_6_docker'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          #======================================================================
          - job_name: core-client-centralized-p1
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:1/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          - job_name: core-client-centralized-p2
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:2/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          - job_name: core-client-centralized-p3
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:3/3 -- centralized --skip full_gen_tests --skip nightly --skip k8s_ --skip threshold --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: false
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          #======================================================================
          - job_name: core-client-unit-p1
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:1/3 -- --skip centralized --skip threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          - job_name: core-client-unit-p2
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:2/3 -- --skip centralized --skip threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          - job_name: core-client-unit-p3
            crate_names: '-p kms-core-client'
            args_tests: '--features testing --partition count:3/3 -- --skip centralized --skip threshold --skip full_gen_tests --skip nightly --skip k8s_ --skip isolated_test_example'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '64cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '4'
          #======================================================================
          # Core service - aggressively sharded by family and partition.
          - job_name: core-service-lib-p1
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:1/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p2
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:2/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p3
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:3/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p4
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:4/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p5
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:5/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p6
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:6/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p7
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:7/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p8
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:8/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p9
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:9/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-lib-p10
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:10/10 --lib -- --skip nightly --skip test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          #======================================================================
          - job_name: core-service-lib-epoch-reshare
            crate_names: '-p kms'
            args_tests: '-F slow_tests -F s3_tests -F insecure --partition count:1/1 --lib -- test_new_epoch_with_reshare'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '1'
          #======================================================================
          - job_name: core-service-test-p1
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:1/4 -- --skip threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-test-p2
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:2/4 -- --skip threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-test-p3
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:3/4 -- --skip threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          - job_name: core-service-test-p4
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:4/4 -- --skip threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '4'
          #======================================================================
          - job_name: core-service-threshold-p1
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:1/3 threshold -- --skip default_user_decryption_threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '6'
          - job_name: core-service-threshold-p2
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:2/3 threshold -- --skip default_user_decryption_threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '6'
          - job_name: core-service-threshold-p3
            crate_names: '-p kms'
            args_tests: '-E kind(test) -F slow_tests -F s3_tests -F insecure --partition count:3/3 threshold -- --skip default_user_decryption_threshold --skip nightly'
            run_minio: true
            run_redis: false
            skip_test_material: false
            lfs: true
            runs_on: '64cpu-linux-x64'
            runner_volume: '400gb'
            rust_log_level: 'info'
            nextest_threads: '6'
          #======================================================================
          # Core threshold.
          - job_name: core-threshold-lib-p1
            crate_names: '-p experiments'
            args_tests: '--partition count:1/3 --lib'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          - job_name: core-threshold-lib-p2
            crate_names: '-p experiments'
            args_tests: '--partition count:2/3 --lib'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          - job_name: core-threshold-lib-p3
            crate_names: '-p experiments'
            args_tests: '--partition count:3/3 --lib'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          - job_name: core-threshold-redis
            crate_names: '-p experiments'
            args_tests: '--partition count:1/1 --test integration_redis'
            run_minio: false
            run_redis: true
            skip_test_material: true
            lfs: false
            runs_on: '8cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '1'
          #======================================================================
          # Core gRPC.
          - job_name: core-grpc-p1
            crate_names: '-p kms-grpc'
            args_tests: '--partition count:1/3 --all-features'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          - job_name: core-grpc-p2
            crate_names: '-p kms-grpc'
            args_tests: '--partition count:2/3 --all-features'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          - job_name: core-grpc-p3
            crate_names: '-p kms-grpc'
            args_tests: '--partition count:3/3 --all-features'
            run_minio: false
            run_redis: false
            skip_test_material: true
            lfs: false
            runs_on: '32cpu-linux-x64'
            runner_volume: '200gb'
            rust_log_level: 'error'
            nextest_threads: '3'
          #======================================================================
    uses: ./.github/workflows/common-testing.yml
    with:
      crate-names: ${{ matrix.crate_names }}
      args-tests: ${{ matrix.args_tests }}
      run-minio: ${{ matrix.run_minio }}
      run-redis: ${{ matrix.run_redis }}
      skip-test-material: ${{ matrix.skip_test_material }}
      lfs: ${{ matrix.lfs }}
      runs-on: ${{ matrix.runs_on }}
      runner-volume: ${{ matrix.runner_volume }}
      rust-log-level: ${{ matrix.rust_log_level }}
      nextest-test-threads: ${{ matrix.nextest_threads }}
      # Same EFS material path for every matrix entry, so reference the
      # generate-test-material output once here instead of per entry.
      efs-test-material-path: ${{ needs.generate-test-material.outputs.efs-test-material-path }}
    secrets: inherit

  test-reporter:
    name: parallel-testing/test-reporter
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [test-matrix]
    uses: ./.github/workflows/test-reporter.yml
    with:
      initial-workflow: 'parallel-testing'
    permissions:
      checks: write # Required to write to the GitHub Actions check suite
      packages: read # Required to read from the GitHub Packages registry
      issues: write # Required to write to the GitHub Issues API
      pull-requests: write # Required to write to the GitHub Pull Requests API
      actions: read # Required to read the GitHub Actions API
      contents: read # Required to read the GitHub Contents API
    secrets: inherit
