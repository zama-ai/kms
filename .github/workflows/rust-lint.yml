name: rust-lint

on:
  pull_request:

concurrency:
  group: rust-lint-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read # Required to checkout repository code
  actions: read # Required to read workflow run information

jobs:
  # Formatting only needs rustfmt: no protoc, no nextest, no workspace build.
  # Kept as its own job so it gives near-instant feedback in parallel with the
  # heavier clippy/dylint jobs.
  fmt:
    name: rust-lint/fmt
    permissions:
      contents: read # Required to checkout repository code
      actions: read # Required to read workflow run information
      id-token: write # Required for OIDC token generation
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache
    steps:
      - name: Checkout Project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}
          rust-components: rustfmt

      - name: Formatting
        run: |
          echo "EXECUTING: cargo fmt --all -- --check"
          cargo fmt --all -- --check

  clippy:
    name: rust-lint/clippy
    permissions:
      contents: read # Required to checkout repository code
      actions: read # Required to read workflow run information
      id-token: write # Required for OIDC token generation
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache
    steps:
      - name: Checkout Project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Rust and Protoc
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}
          rust-components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          # Share the stable-toolchain cache with the build/test workflows.
          shared-key: kms-rust
          # Populated by the main workflow; PRs restore only.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: |
          echo "EXECUTING: cargo clippy --workspace --all-targets --all-features -- -D warnings"
          cargo clippy --workspace --all-targets --all-features -- -D warnings

  dylint:
    name: rust-lint/dylint
    permissions:
      contents: read # Required to checkout repository code
      actions: read # Required to read workflow run information
      id-token: write # Required for OIDC token generation
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64/spot=false/volume=200gb/extras=s3-cache
    steps:
      - name: Checkout Project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          # Full history so the backward-snapshot step can `git worktree add` the
          # PR base SHA; a shallow clone would not contain that commit.
          fetch-depth: 0

      - name: Get Rust version
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          version="$(grep 'channel' "$GH_WORKSPACE/rust-toolchain.toml" | awk -F' = ' '{print $2}' | tr -d '"')"
          echo "RUST_IMAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Rust and Protoc
        uses: ./.github/actions/setup-rust-and-protoc
        with:
          rust-toolchain: ${{ env.RUST_IMAGE_VERSION }}
          rust-components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          # Dedicated key: dylint checks the workspace under its own nightly
          # driver toolchains, so these target artifacts are incompatible with
          # the stable `kms-rust` cache and must not pollute it.
          shared-key: kms-rust-dylint
          # Nothing else builds these nightly artifacts, so save on first-party
          # PRs (not forks) to bootstrap and keep the cache warm.
          save-if: ${{ github.event.pull_request.head.repo.fork == false }}
          cache-bin: true

      - name: Install Dylint
        run: |
          echo "EXECUTING: make install-dylint"
          make install-dylint

      - name: Dylint
        run: |
          echo "EXECUTING: make lint-dylint"
          make lint-dylint

      - name: Check backward snapshot compatibility
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          echo "EXECUTING: make backward-snapshot-check BASE_REF=${BASE_SHA}"
          make backward-snapshot-check "BASE_REF=${BASE_SHA}"
