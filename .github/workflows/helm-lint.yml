name: helm-lint
on:
  workflow_call:
permissions:
  contents: read
jobs:
  lint:
    name: helm-lint/lint (bpr)
    runs-on: 'ubuntu-latest'
    steps:
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf; if lsmod | grep -q algif_aead; then sudo rmmod algif_aead; fi
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Lint
        uses: WyriHaximus/github-action-helm3@fc4ba26e75cf5d08182c6ce3b72623c8bfd7272b # v3.1.0
        with:
          exec: helm lint charts/*
