# Actionlint.yaml config file is automatically detected by cilint.yaml job
# and contains the label of zama runners
self-hosted-runner:
  labels:
    - large_ubuntu_16_arm
    - large_ubuntu_32
    - runs-on=github.run_id/runner=16cpu-linux-x64/spot=false
    - runs-on=github.run_id/runner=16cpu-linux-x64/spot=true

paths:
  # TEMP: main.yml has many jobs gated behind `if: false` to focus CI on the
  # test-workspace-crates job while iterating. Remove this `paths:` block
  # (and the `if: false`s in main.yml) once done.
  .github/workflows/main.yml:
    ignore:
      - 'constant expression "false" in condition'