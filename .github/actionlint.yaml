# Actionlint.yaml config file is automatically detected by cilint.yaml job
# and contains the label of zama runners
self-hosted-runner:
  labels:
    - large_ubuntu_16_arm
    - large_ubuntu_32
    - runs-on=github.run_id/runner=16cpu-linux-x64/spot=false
    - runs-on=github.run_id/runner=16cpu-linux-x64/spot=true

# TEMP: round3 probe — suppress constant-`if:` warnings so we can disable
# jobs with `if: false` while probing. Remove this section when the probe
# ends.
paths:
  ".github/workflows/main.yml":
    ignore:
      - 'constant expression "false"'
