name: Checkout Project
description: Reusable wrapper around actions/checkout

inputs:
  persist-credentials:
    description: Whether to persist git credentials
    required: false
    default: "false"
  submodules:
    description: Whether to checkout submodules
    required: false
    default: "false"
  token:
    description: Optional token for checkout
    required: false
    default: ${{ github.token }}
  repository:
    description: Repository to checkout (owner/repo)
    required: false
    default: ${{ github.repository }}
  ref:
    description: Optional git ref to checkout
    required: false
    default: ""
  fetch-depth:
    description: Number of commits to fetch (0 for full history)
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: ${{ inputs.persist-credentials }}
        submodules: ${{ inputs.submodules }}
        token: ${{ inputs.token }}
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
