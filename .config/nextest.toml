nextest-version = { required = "0.9.48" }

# =============================================================================
# Test Groups — enforce sequential execution for tests sharing infrastructure
# =============================================================================
# nextest runs each test in a separate process, so #[serial] attributes alone
# are insufficient to prevent parallel execution across binaries.
[test-groups]
# integration_test spin up full KMS servers; running them in parallel could cause port/resource contention, hence we
# force serialization.
integration-serial = { max-threads = 1 }
# K8s tests (kubernetes_test_* binaries) share the same KMS pods in a Kind
# cluster — concurrent requests would interfere with each other.
k8s-integration    = { max-threads = 1 }

# =============================================================================
# CI profile: used for PR checks (fast feedback)
# =============================================================================
# Excludes slow tests from integration_test that only run nightly:
#   - nightly_full_gen_tests_default*           (uses FheParameter::Default — production-sized, slow)
#   - nightly_tests_threshold_sequential_crs
#   - test_threshold_concurrent_crs
[profile.ci]
default-filter = 'not (binary(=integration_test) & test(/nightly_full_gen_tests_default|nightly_tests_threshold_sequential_crs|test_threshold_concurrent_crs/))'

[profile.ci.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# Long timeout for tests that use production-sized FHE parameters (Default +
# SnS). Give them a 2h window before termination.
[[profile.ci.overrides]]
filter = 'binary(=integration_test) & test(/nightly_full_gen_tests_default|nightly_tests_threshold_sequential_crs|test_threshold_concurrent_crs/)'
slow-timeout = { period = "600s", terminate-after = 12 }
test-group = "integration-serial"

# Serialize remaining integration_test binaries.
[[profile.ci.overrides]]
filter = "binary(=integration_test)"
test-group = "integration-serial"

# Serialize all K8s test binaries (kubernetes_test_threshold*,
# kubernetes_test_centralized*) — they share the same Kind cluster pods.
[[profile.ci.overrides]]
filter = "binary(/^kubernetes_test_/)"
test-group = "k8s-integration"

# =============================================================================
# CI-nightly profile: used for scheduled builds — runs ALL tests
# =============================================================================
# No default-filter: includes the slow tests that the ci profile skips.
# The serialization overrides below are identical to ci.
[profile.ci-nightly]

[profile.ci-nightly.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# Long timeout + serialization for slow Default-param tests (same as ci profile).
# IMPORTANT: Must come before integration-serial catch-all (first match wins).
[[profile.ci-nightly.overrides]]
filter = 'binary(=integration_test) & test(/nightly_full_gen_tests_default|nightly_tests_threshold_sequential_crs|test_threshold_concurrent_crs/)'
slow-timeout = { period = "600s", terminate-after = 12 }
test-group = "integration-serial"

# Serialize remaining integration_test binaries.
[[profile.ci-nightly.overrides]]
filter = "binary(=integration_test)"
test-group = "integration-serial"

# Serialize K8s tests (same as ci profile).
[[profile.ci-nightly.overrides]]
filter = "binary(/^kubernetes_test_/)"
test-group = "k8s-integration"
