[package]
name = "threshold-execution"
version.workspace = true
edition.workspace = true
publish.workspace = true
authors.workspace = true
license.workspace = true
description = "Execution runtime for MPC protocols, including distributed key generation, secret resharing, decryption, and reconstruction."

[dependencies]
aes.workspace = true
aes-prng.workspace = true
algebra.workspace = true
anyhow.workspace = true
async-trait.workspace = true
bc2wrap.workspace = true
cfg-if.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
const_format.workspace = true
derive_more.workspace = true
error-utils.workspace = true
futures-util = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
hashing.workspace = true
itertools.workspace = true
mockall.workspace = true
ndarray.workspace = true
num-integer.workspace = true
num-traits.workspace = true
rand.workspace = true
rayon.workspace = true
redis = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive", "rc"] }
statrs.workspace = true
strum = { workspace = true, features = ["derive"] }
test-utils = { workspace = true, optional = true }
tfhe = { workspace = true, features = [
    "boolean",
    "shortint",
    "integer",
    "zk-pok",
] }
tfhe-csprng.workspace = true
tfhe-zk-pok = { workspace = true, optional = true }
tfhe-versionable.workspace = true
thread-handles = { workspace = true, optional = true }
threshold-types.workspace = true
threshold-networking = { workspace = true, optional = true }
tokio = { workspace = true, features = [
    "sync",
    "rt",
    "macros",
    "time",
], optional = true }
tonic = { workspace = true, features = ["tls-ring"], optional = true }
tracing.workspace = true
zeroize.workspace = true

[dev-dependencies]
async-std.workspace = true
futures-util.workspace = true
futures.workspace = true
paste.workspace = true
rstest.workspace = true
serial_test.workspace = true
test-utils.workspace = true
tempfile.workspace = true
tfhe-zk-pok = { workspace = true, features = ["experimental"] }
algebra = { workspace = true, features = ["all_extension_degrees"] }


[features]
default = ["non-wasm", "algebra/extension_degree_4"]
non-wasm = [
    "dep:threshold-networking",
    "dep:tfhe-zk-pok",
    "dep:redis",
    "dep:thread-handles",
    "dep:tokio",
    "dep:tonic",
]
testing = ["non-wasm", "dep:tokio", "dep:futures-util", "dep:futures", "dep:test-utils"]
slow_tests = ["testing"]
malicious_strategies = ["testing", "algebra/extension_degree_4"]
