# See default_1.toml for the documentation.

[service]
listen_address = "0.0.0.0"
listen_port = 50051
timeout_secs = 360
grpc_max_message_size = 104857600 # 100 MiB

[enclave_bootstrap]
web_identity_token_port = 4100
resolv_conf_port = 4200

[enclave_bootstrap.network_tunnel]
subnet = "10.118.0.0/24"
parent_address = "10.118.0.1/24"
enclave_address = "10.118.0.2"
vsock_port = 2100
queue_count = 1

[telemetry]
tracing_service_name = "kms-centralized"
# tracing_endpoint = "http://localhost:4317"
metrics_bind_address = "0.0.0.0:9646"
enable_sys_metrics = true

[telemetry.batch]
max_queue_size = 8192
max_export_batch_size = 2048
scheduled_delay_ms = 500

[aws]
region = "eu-west-3"
# Optional mock/test overrides. For localstack-style mocks, keep these on HTTP
# unless the endpoint presents a certificate valid for its actual hostname.
# imds_endpoint = "http://127.0.0.1:5000"
# s3_endpoint = "http://127.0.0.1:4566"
# awskms_endpoint = "http://127.0.0.1:4566"

[public_vault]
[public_vault.storage.s3]
bucket = "zama_kms_public_keys"

[private_vault]
[private_vault.storage.s3]
bucket = "zama_kms_private_keys"

[private_vault.keychain.aws_kms]
root_key_id = "zama_kms_storage_root_key"
root_key_spec = "symm"

[backup_vault]
[backup_vault.storage.file]
path = "./backup_vault"
