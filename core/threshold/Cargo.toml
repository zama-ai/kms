[package]
name = "threshold-fhe"
version.workspace = true
edition.workspace = true
license.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# ⚠️ IMPORTANT: Add new dependencies to workspace root Cargo.toml, NOT here!
# Use .workspace = true to reference workspace dependencies
# Maintain alphabetical order
aes.workspace = true
aes-prng.workspace = true
algebra = { workspace = true, default-features = false }
anyhow.workspace = true
async-trait.workspace = true
attestation-doc-validation = { workspace = true, optional = true}
backoff = { workspace = true, features = ["tokio"], optional = true }
bc2wrap.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
dashmap.workspace = true
error-utils.workspace = true
threshold-execution.workspace = true
futures.workspace = true
futures-util.workspace = true
getrandom.workspace = true
hex.workspace = true
hyper-rustls-ring = { workspace = true, optional = true }
itertools.workspace = true
k256.workspace = true
lazy_static.workspace = true
minijinja = { workspace = true, optional = true }
threshold-networking = { workspace = true, optional = true }
observability = { workspace = true, optional = true }
opentelemetry = { workspace = true, optional = true }
paste.workspace = true
peak_alloc = { workspace = true, optional = true }
rand.workspace = true
rcgen = { workspace = true, optional = true }
redis = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive", "rc"] }
strum = { workspace = true, features = ["derive"] }
strum_macros.workspace = true
test-utils = { workspace = true, optional = true }
tfhe = { workspace = true, features = [
    "boolean",
    "shortint",
    "integer",
    "zk-pok",
] }
tfhe-csprng.workspace = true
tfhe-zk-pok = { workspace = true, optional = true }
tokio = { workspace = true, features = [
    "sync",
    "rt",
    "macros",
    "time",
], optional = true }
tokio-rustls = { workspace = true, optional = true }
tonic = { workspace = true, features = ["tls-ring"], optional = true }
tonic-health = { workspace = true, optional = true }
tower = { workspace = true, features = ["retry", "timeout"], optional = true }
tower-http = { workspace = true, features = ["trace"], optional = true }
threshold-types.workspace = true
thread-handles = { workspace = true, optional = true }
tracing = { workspace = true, features = ["log"] }
x509-parser = { workspace = true, optional = true }
zeroize.workspace = true

[build-dependencies]
tonic-prost-build.workspace = true

[dev-dependencies]
# ⚠️ IMPORTANT: Add new dependencies to workspace root Cargo.toml, NOT here!
# Use .workspace = true to reference workspace dependencies
# Maintain alphabetical order
criterion= {workspace = true, features = ["async_tokio", "html_reports"] }
threshold-execution = { workspace = true, features = ["testing"] }
pprof.workspace = true
rustls-webpki.workspace = true
serial_test.workspace = true
test-utils.workspace = true
tempfile.workspace = true
tfhe-zk-pok = { workspace = true, features = ["experimental"] }
threshold-fhe = { workspace = true, features = ["testing"] }

[package.metadata.cargo-machete]
ignored = ["getrandom", "opentelemetry"]

[lib]
crate-type = ["lib", "cdylib"]

[[bin]]
name = "moby"
path = "src/bin/moby/moby.rs"
required-features = ["choreographer"]

[[bin]]
name = "mobygo"
path = "src/bin/moby/mobygo.rs"
required-features = ["choreographer"]

[[bin]]
name = "gen-experiment"
path = "src/bin/benches/gen-experiment.rs"
required-features = ["templating"]

[[bin]]
name = "threshold-gen-tls-certs"
path = "src/bin/threshold-gen-tls-certs.rs"

[[bin]]
name = "non-threshold-kat"
path = "src/bin/non-threshold/kat.rs"

[[bench]]
name = "ddec"
harness = false
required-features = ["testing", "extension_degree_8"]

[[bench]]
name = "bench_switch_and_squash"
harness = false
required-features = ["testing"]

[[bench]]
name = "bench_prss"
harness = false
required-features = ["extension_degree_8"]

[[bench]]
name = "prep"
harness = false
required-features = ["testing", "extension_degree_8"]

[[bench]]
name = "bit_dec"
harness = false
required-features = ["testing", "extension_degree_8"]

[[bench]]
name = "ceremony"
harness = false
required-features = ["testing", "extension_degree_8"]


# TFHE-rs benchmarks
[[bench]]
name = "non-threshold_tfhe-rs_erc20_speed"
path = "benches/non-threshold/tfhe-rs/speed/erc20.rs"
harness = false

[[bench]]
name = "non-threshold_tfhe-rs_basic-ops_speed"
path = "benches/non-threshold/tfhe-rs/speed/basic_ops.rs"
harness = false

[[bench]]
name = "non-threshold_tfhe-rs_keygen_speed"
path = "benches/non-threshold/tfhe-rs/speed/keygen.rs"
harness = false

[[bench]]
name = "non-threshold_tfhe-rs_erc20_memory"
path = "benches/non-threshold/tfhe-rs/memory/erc20.rs"
required-features = ["measure_memory"]
harness = false

[[bench]]
name = "non-threshold_tfhe-rs_basic-ops_memory"
path = "benches/non-threshold/tfhe-rs/memory/basic_ops.rs"
required-features = ["measure_memory"]
harness = false

[[bench]]
name = "non-threshold_tfhe-rs_keygen_memory"
path = "benches/non-threshold/tfhe-rs/memory/keygen.rs"
required-features = ["measure_memory"]
harness = false



[features]
default = ["non-wasm", "extension_degree_4"]
# Some utilities used in the `testing` feature require the `non-wasm` feature to be enabled
testing = ["non-wasm", "threshold-execution/testing", "dep:tokio", "dep:test-utils"]
slow_tests = ["testing", "all_extension_degrees", "algebra/all_extension_degrees"]
templating = ["minijinja"]
choreographer = ["malicious_strategies", "threshold-networking/choreographer", "threshold-execution/malicious_strategies"]
measure_memory = ["dep:peak_alloc"]
malicious_strategies = ["testing"]

# put all the dependencies that do not work well with wasm
# namely libraries that don't work on 32-bit architectures
# or uses tokio
non-wasm = [
	"threshold-execution/non-wasm",
	"dep:threshold-networking",

    "dep:attestation-doc-validation",
    "dep:backoff",
    "dep:hyper-rustls-ring",
    "dep:observability",
    "dep:opentelemetry",
    "dep:rcgen",
    "dep:redis",
    "dep:tfhe-zk-pok",
    "dep:thread-handles",
    "dep:tokio",
    "dep:tokio-rustls",
    "dep:tonic",
    "dep:tonic-health",
    "dep:tower",
    "dep:tower-http",
    "dep:x509-parser",
]

extension_degree_3 = ["algebra/extension_degree_3", "threshold-execution/extension_degree_3"]
extension_degree_4 = ["algebra/extension_degree_4", "threshold-execution/extension_degree_4"]
extension_degree_5 = ["algebra/extension_degree_5", "threshold-execution/extension_degree_5"]
extension_degree_6 = ["algebra/extension_degree_6", "threshold-execution/extension_degree_6"]
extension_degree_7 = ["algebra/extension_degree_7", "threshold-execution/extension_degree_7"]
extension_degree_8 = ["algebra/extension_degree_8", "threshold-execution/extension_degree_8"]

all_extension_degrees = [
    "extension_degree_3",
    "extension_degree_4",
    "extension_degree_5",
    "extension_degree_6",
    "extension_degree_7",
    "extension_degree_8",
]
