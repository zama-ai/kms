[config]
unstable_features = ["CTRL_C_HANDLING"]

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true # Remove this if it's not in a workspace
THRESHOLD_FHE_DOCKER_FILE = "docker/nist_testing.dockerfile" # Default to nist_testing as the local one uses private images
THRESHOLD_FHE_DOCKER_ROOT = "../../" # use "../../" when in a workspace, "." otherwise.

### Generic commands to be used for local deployment with docker
# Build the image for TFHE/BGV parties, with testing feature to allow centralized DKG
[tasks.tfhe-docker-image-degree-3]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_3", "-t", "tfhe-core-degree-3", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-4]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_4", "-t", "tfhe-core-degree-4", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-5]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_5", "-t", "tfhe-core-degree-5", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-6]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_6", "-t", "tfhe-core-degree-6", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-7]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_7", "-t", "tfhe-core-degree-7", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-8]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_8", "-t", "tfhe-core-degree-8", "${THRESHOLD_FHE_DOCKER_ROOT}"]

# Build all the images for TFHE parties
[tasks.tfhe-docker-images-all-degrees]
run_task = { name = ["tfhe-docker-image-degree-3", "tfhe-docker-image-degree-4", "tfhe-docker-image-degree-5", "tfhe-docker-image-degree-6", "tfhe-docker-image-degree-7", "tfhe-docker-image-degree-8"]}

[tasks.tfhe-docker-image-degree-3-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_3", "-t", "tfhe-core-degree-3-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-4-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_4", "-t", "tfhe-core-degree-4-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-5-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_5", "-t", "tfhe-core-degree-5-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-6-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_6", "-t", "tfhe-core-degree-6-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-7-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_7", "-t", "tfhe-core-degree-7-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

[tasks.tfhe-docker-image-degree-8-mem]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=measure_memory,extension_degree_8", "-t", "tfhe-core-degree-8-mem", "${THRESHOLD_FHE_DOCKER_ROOT}"]

#Build the image for BGV parties (with centralized DKG available)
[tasks.bgv-docker-image]
command = "docker"
args = ["build", "-f", "${THRESHOLD_FHE_DOCKER_FILE}", "--build-arg", "FEATURES=extension_degree_4", "-t", "bgv-core", "${THRESHOLD_FHE_DOCKER_ROOT}"]

# Generate the certificate for TLS communication of the parties
# Note: templating feature isn't required, but allows to compile the code only once since gen-experiment requires the feature
[tasks.gen-test-certs]
command = "cargo"
args = ["run", "--bin", "threshold-gen-tls-certs","--release","--features", "templating",  "--", "--ca-prefix", "p", "--ca-count", "${NUM_PARTIES}", "-n", "1", "-o", "test_certs"]

#Generate docker-compose file for the TFHE parties as well as the toml config file for the choreogrpaher for a local deployment (tfhe)
[tasks.tfhe-gen-experiment]
command = "cargo"
args = ["run", "--bin", "gen-experiment", "--release", "--features", "templating", "--", "-n", "${NUM_PARTIES}", "-t", "${THRESHOLD}", "-s", "${MOBY_STRATEGY}", "-f", "temp", "-o", "${EXPERIMENT_NAME}", "all", "--protocol", "tfhe" ]

#Generate docker-compose file for the BGV parties as well as the toml config file for the choreogrpaher for a local deployment (bgv)
[tasks.bgv-gen-experiment]
command = "cargo"
args = ["run", "--bin", "gen-experiment", "--release", "--features", "templating", "--", "-n", "${NUM_PARTIES}", "-t", "${THRESHOLD}", "-s", "${MOBY_STRATEGY}", "-f", "temp", "-o", "${EXPERIMENT_NAME}" , "all", "--protocol", "bgv"]


#Bring parties alive based on provided yml file, waiting for health check to pass
[tasks.start-parties-healthy]
command = "docker"
args = ["compose", "--progress=quiet", "-f", "temp/${EXPERIMENT_NAME}.yml", "up", "--quiet-pull", "--wait"]

###One liner for benching everything
[tasks.experiment-name]
script = '''
echo ""
echo ""
echo "========================================================="
echo "=                                                       ="
echo "= Experiment: ${EXPERIMENT_NAME}                        "
echo "=                                                       "
echo "= Parties: ${NUM_PARTIES}                               "
echo "= Threshold: ${THRESHOLD}                               "
echo "=                                                       ="
echo "========================================================="
echo ""
echo ""
'''

#Shut down the parties and do some file management
[tasks.shutdown]
script = '''
mkdir -p temp/stats
docker stats --no-stream > temp/stats/${EXPERIMENT_NAME}_$(date +%Y_%m_%d-%H:%M:%S).log
docker compose -f temp/${EXPERIMENT_NAME}.yml logs > temp/${EXPERIMENT_NAME}.log
docker compose --progress=quiet -f temp/${EXPERIMENT_NAME}.yml down
mkdir -p temp/telemetry/archived
mv temp/telemetry/export.json temp/telemetry/archived/trace_${EXPERIMENT_NAME}_$(date +%Y_%m_%d-%H:%M:%S).json
'''

# Setup the test, creating the necessary directories and files for telemetry and session stats, with appropriate permissions for the parties to write to them. Also adds a header to the session stats files to indicate the start of a new run with the experiment name and timestamp. This task is meant to be run before starting the parties in an experiment.
[tasks.setup]
script = '''
mkdir -p temp/telemetry
echo "" > temp/telemetry/export.json
chmod o+w temp/telemetry/export.json
mkdir -p temp/session_stats
RUN_DATE="$(date -u +%Y%m%dT%H%M%SZ)-$$"
for i in $(seq 1 ${NUM_PARTIES}); do
    touch temp/session_stats/session_stats_$i.txt
    printf "\nNEW_RUN: ${EXPERIMENT_NAME} ${RUN_DATE}" >> temp/session_stats/session_stats_$i.txt
    chmod o+w temp/session_stats/session_stats_$i.txt
done
'''


# Runs a cluster of 4 parties with the tfhe protocol, with a threshold of 1, and the "secure" strategy (no malicious behavior)
[tasks.tfhe-bench-run-4p]
env = {"NUM_PARTIES" = "4", THRESHOLD = "1", MOBY_STRATEGY="secure", EXPERIMENT_NAME="tfhe-bench-run-4p"}
run_task = { name = ["setup", "gen-test-certs", "tfhe-gen-experiment", "experiment-name", "start-parties-healthy"], fork = true}

# Runs a cluster of 5 parties with the tfhe protocol, with a threshold of 1, and the "secure" strategy (no malicious behavior)
[tasks.tfhe-bench-run-5p]
env = {"NUM_PARTIES" = "5", THRESHOLD = "1", MOBY_STRATEGY="secure", EXPERIMENT_NAME="tfhe-bench-run-5p"}
