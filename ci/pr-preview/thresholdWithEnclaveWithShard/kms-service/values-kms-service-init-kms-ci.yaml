kmsCore:
  enabled: false
  envFrom:
    configmap:
      name:
  # Enclave must be enabled so the secondary-network (B) init job renders alongside
  # the primary init job (the B init job is gated on nitroEnclave + secondaryEnclave).
  nitroEnclave:
    enabled: true
  # Enable the co-located shard so the B init job is rendered. Its peersList is
  # injected dynamically by deploy.sh (secondary peers values).
  secondaryEnclave:
    enabled: true
  thresholdMode:
    enabled: true
    tls:
      enabled: true
    nitroEnclave:
      enabled: true

kmsCoreClient:
  enabled: true
  nameOverride: kms-core-client
  decryption_mode: NoiseFloodSmall
  fhe_parameter: Default
  resources:
    requests:
      memory: 24Gi
      cpu: 4
    limits:
      memory: 24Gi
      cpu: 4
  nodeSelector:
    karpenter.sh/nodepool: zws-pool
  tolerations:
    - key: karpenter.sh/nodepool
      effect: NoSchedule
      operator: Equal
      value: zws-pool

kmsInit:
  enabled: true
  nodeSelector:
    karpenter.sh/nodepool: kms-pool
  tolerations:
    - key: karpenter.sh/nodepool
      effect: NoSchedule
      operator: Equal
      value: kms-pool

kmsGenKeys:
  enabled: false

kmsGenCertAndKeys:
  enabled: false

kmsCoreClientTesting:
  enabled: false
