apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: sustained-rate-kms-<version>-
  namespace: kms-ci
  labels:
    app: sustained-rate-kms
spec:
  serviceAccountName: workflow-runner
  activeDeadlineSeconds: 1800  # 30 minutes while iterating on the sustained-rate workflow
  # Delete the completed Workflow object and pod metadata after 24h. Test output
  # remains in pod logs, Slack, and any external log/artifact sinks.
  ttlStrategy:
    secondsAfterCompletion: 86400
  tolerations:
  - key: karpenter.sh/nodepool
    effect: NoSchedule
    operator: Equal
    value: kms-pool
  volumes:
  - name: slack-webhook-volume
    secret:
      secretName: slack-webhook

  entrypoint: sustained-rate-kms
  arguments:
    parameters:
    - name: tls
      value: "disabled"
    - name: client-logs
      value: "enabled"
    - name: run_url
      value: "Manually triggered"
    - name: fhe-params
      value: "Default"
    - name: duration
      value: "60"
    - name: max-in-flight
      value: "10000"
    - name: data-type
      value: "euint64"
    - name: batch-size
      value: "1"
    - name: s3-config-map-name
      value: "kms-ci-1"
    # TODO: parameterize num-parties, num-majority, and num-reconstruct together
    # with the CI deployment. Useful target: 4 parties with 2/3 thresholds in
    # addition to the current 13-party 5/9 setup.

  templates:
    - name: sustained-rate-kms
      dag:
        tasks:
          - name: udec-setup
            template: prepare-udec-key

          - name: sustained-rate-udec-100
            dependencies: ["udec-setup"]
            template: run-udec-rate
            arguments:
              parameters:
              - name: rate
                value: "100"
              - name: key_id
                value: "{{tasks.udec-setup.outputs.parameters.key-id}}"
              - name: previous-ok
                value: "true"

          - name: summary
            dependencies: ["sustained-rate-udec-100"]
            template: summary-report
            arguments:
              parameters:
              - name: test-result-100
                value: "{{tasks.sustained-rate-udec-100.outputs.parameters.test-result}}"
              - name: tls
                value: "{{workflow.parameters.tls}}"
              - name: run_url
                value: "{{workflow.parameters.run_url}}"
              - name: duration
                value: "{{workflow.parameters.duration}}"
              - name: max-in-flight
                value: "{{workflow.parameters.max-in-flight}}"

    - name: prepare-udec-key
      outputs:
        parameters:
        - name: key-id
          valueFrom:
            path: /tmp/artifacts/key_id.txt
      metadata:
        labels:
          test: udec-setup
          app: sustained-rate-kms
      script:
        image: hub.zama.org/ghcr/zama-ai/kms/core-client:<client-version>
        command: ["/bin/bash", "-c"]
        source: |
          set -euo pipefail
          write_config() {
            cat <<EOF > config.toml
            kms_type = "threshold"
            num_majority=${NUM_MAJORITY}
            num_reconstruct=${NUM_RECONSTRUCT}
            decryption_mode="${DECRYPTION_MODE}"
            fhe_params="${FHE_PARAMETER:=Default}"
            [[cores]]
            party_id=1
            address="kms-core-1-core-1:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p1"
            [[cores]]
            party_id=2
            address="kms-core-2-core-2:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p2"
            [[cores]]
            party_id=3
            address="kms-core-3-core-3:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p3"
            [[cores]]
            party_id=4
            address="kms-core-4-core-4:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p4"
            [[cores]]
            party_id=5
            address="kms-core-5-core-5:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p5"
            [[cores]]
            party_id=6
            address="kms-core-6-core-6:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p6"
            [[cores]]
            party_id=7
            address="kms-core-7-core-7:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p7"
            [[cores]]
            party_id=8
            address="kms-core-8-core-8:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p8"
            [[cores]]
            party_id=9
            address="kms-core-9-core-9:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p9"
            [[cores]]
            party_id=10
            address="kms-core-10-core-10:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p10"
            [[cores]]
            party_id=11
            address="kms-core-11-core-11:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p11"
            [[cores]]
            party_id=12
            address="kms-core-12-core-12:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p12"
            [[cores]]
            party_id=13
            address="kms-core-13-core-13:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p13"
          EOF
          }

          mkdir -p /tmp/artifacts
          write_config
          client_logs_arg=""
          if [ "{{workflow.parameters.client-logs}}" = "enabled" ]; then
            client_logs_arg="--logs"
          fi

          ./bin/kms-core-client ${client_logs_arg} --max-iter 2880 -f config.toml insecure-preproc-key-gen 2>&1 | tee /tmp/preproc_logs.txt
          preproc_id=$(awk -F'"' '/"request_id":/ { id=$4 } END { print id }' /tmp/preproc_logs.txt)
          if [ -z "$preproc_id" ]; then
            echo "Failed to extract udec preprocessing request id"
            exit 1
          fi

          ./bin/kms-core-client ${client_logs_arg} --max-iter 2880 -f config.toml insecure-key-gen -i "$preproc_id" 2>&1 | tee /tmp/keygen_logs.txt
          key_id=$(awk -F'"' '/"request_id":/ { id=$4 } END { print id }' /tmp/keygen_logs.txt)
          if [ -z "$key_id" ]; then
            echo "Failed to extract udec key id"
            exit 1
          fi

          echo "$key_id" > /tmp/artifacts/key_id.txt
          echo "Prepared udec key $key_id"
        env: &core-client-env
          - name: S3_ENDPOINT
            valueFrom:
              configMapKeyRef:
                name: '{{workflow.parameters.s3-config-map-name}}'
                key: CORE_CLIENT__S3_ENDPOINT
          - name: NUM_MAJORITY
            value: '5'
          - name: NUM_RECONSTRUCT
            value: '9'
          - name: DECRYPTION_MODE
            value: 'NoiseFloodSmall'
          - name: FHE_PARAMETER
            value: '{{workflow.parameters.fhe-params}}'
        resources: &core-client-resources
          requests:
            memory: "96Gi"
            cpu: "64"
          limits:
            memory: "96Gi"
            cpu: "64"

    - name: run-udec-rate
      inputs:
        parameters:
        - name: rate
        - name: key_id
        - name: previous-ok
      outputs:
        parameters:
        - name: test-result
          valueFrom:
            path: /tmp/artifacts/sustained-rate-udec-{{inputs.parameters.rate}}.json
        - name: capacity-ok
          valueFrom:
            path: /tmp/artifacts/sustained-rate-udec-{{inputs.parameters.rate}}.ok
      metadata:
        labels:
          test: sustained-rate-udec-{{inputs.parameters.rate}}
          app: sustained-rate-kms
      script:
        image: hub.zama.org/ghcr/zama-ai/kms/core-client:<client-version>
        command: ["/bin/bash", "-c"]
        source: |
          cat <<EOF > config.toml
            kms_type = "threshold"
            num_majority=${NUM_MAJORITY}
            num_reconstruct=${NUM_RECONSTRUCT}
            decryption_mode="${DECRYPTION_MODE}"
            fhe_params="${FHE_PARAMETER:=Default}"
            [[cores]]
            party_id=1
            address="kms-core-1-core-1:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p1"
            [[cores]]
            party_id=2
            address="kms-core-2-core-2:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p2"
            [[cores]]
            party_id=3
            address="kms-core-3-core-3:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p3"
            [[cores]]
            party_id=4
            address="kms-core-4-core-4:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p4"
            [[cores]]
            party_id=5
            address="kms-core-5-core-5:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p5"
            [[cores]]
            party_id=6
            address="kms-core-6-core-6:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p6"
            [[cores]]
            party_id=7
            address="kms-core-7-core-7:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p7"
            [[cores]]
            party_id=8
            address="kms-core-8-core-8:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p8"
            [[cores]]
            party_id=9
            address="kms-core-9-core-9:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p9"
            [[cores]]
            party_id=10
            address="kms-core-10-core-10:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p10"
            [[cores]]
            party_id=11
            address="kms-core-11-core-11:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p11"
            [[cores]]
            party_id=12
            address="kms-core-12-core-12:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p12"
            [[cores]]
            party_id=13
            address="kms-core-13-core-13:50100"
            s3_endpoint="${S3_ENDPOINT}"
            object_folder="PUB-p13"
          EOF

          test_name="sustained-rate-udec-{{inputs.parameters.rate}}"
          key_id="{{inputs.parameters.key_id}}"
          test_command="user-decrypt from-args -d {{workflow.parameters.data-type}} -k ${key_id} -e ffffffffffffffff --batch-size {{workflow.parameters.batch-size}} --rate {{inputs.parameters.rate}} --duration {{workflow.parameters.duration}} --max-in-flight {{workflow.parameters.max-in-flight}}"
          mkdir -p /tmp/artifacts

          if [ -z "$key_id" ]; then
            printf '{\n  "test_name": "%s",\n  "test_command": "%s",\n  "status": "failed",\n  "exit_code": 1,\n  "duration": 0,\n  "timestamp": "%s",\n  "fhe_params": "{{workflow.parameters.fhe-params}}",\n  "performance_metrics": {\n    "sustained_rate": {\n      "target_rate": %s,\n      "failed": 1\n    }\n  }\n}\n' \
              "$test_name" \
              "$test_command" \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              "{{inputs.parameters.rate}}" \
              > /tmp/artifacts/${test_name}.json
            echo "false" > /tmp/artifacts/${test_name}.ok
            echo "Missing key_id from udec-setup; refusing to run sustained-rate udec"
            exit 0
          fi

          if [ "{{inputs.parameters.previous-ok}}" != "true" ]; then
            printf '{\n  "test_name": "%s",\n  "test_command": "%s",\n  "status": "skipped",\n  "exit_code": 0,\n  "duration": 0,\n  "timestamp": "%s",\n  "fhe_params": "{{workflow.parameters.fhe-params}}",\n  "performance_metrics": {\n    "sustained_rate": {\n      "target_rate": %s\n    }\n  }\n}\n' \
              "$test_name" \
              "$test_command" \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              "{{inputs.parameters.rate}}" \
              > /tmp/artifacts/${test_name}.json
            echo "false" > /tmp/artifacts/${test_name}.ok
            echo "Skipping $test_name because a lower sustained udec rate failed"
            exit 0
          fi

          echo "=========================================="
          echo "Starting test: $test_command"
          echo "=========================================="

          client_logs_arg=""
          if [ "{{workflow.parameters.client-logs}}" = "enabled" ]; then
            client_logs_arg="--logs"
          fi
          rate_timeout=$(({{workflow.parameters.duration}} + 300))
          start_time=$(date +%s)
          if command -v timeout >/dev/null 2>&1; then
            timeout "${rate_timeout}s" ./bin/kms-core-client ${client_logs_arg} --max-iter 2880 -f config.toml $test_command 2>&1 | tee /tmp/test_logs.txt
          else
            echo "WARNING: timeout command not found; running without per-rate wall timeout"
            ./bin/kms-core-client ${client_logs_arg} --max-iter 2880 -f config.toml $test_command 2>&1 | tee /tmp/test_logs.txt
          fi
          test_exit=${PIPESTATUS[0]}
          end_time=$(date +%s)
          duration=$((end_time - start_time))

          sustained_rate_metrics="{\"target_rate\":{{inputs.parameters.rate}}}"
          if grep -q "SUSTAINED_RATE_METRICS" /tmp/test_logs.txt; then
            sustained_rate_metrics=$(grep "SUSTAINED_RATE_METRICS" /tmp/test_logs.txt | tail -1 | sed 's/.*SUSTAINED_RATE_METRICS //')
          fi

          metrics_failed=$(printf '%s' "$sustained_rate_metrics" | jq -r '.failed // 0' 2>/dev/null || echo 0)
          metrics_shed=$(printf '%s' "$sustained_rate_metrics" | jq -r '.shed // 0' 2>/dev/null || echo 0)
          metrics_saturated=$(printf '%s' "$sustained_rate_metrics" | jq -r '.saturated // false' 2>/dev/null || echo false)

          if [ "$test_exit" -eq 0 ] && [ "$metrics_failed" = "0" ] && [ "$metrics_shed" = "0" ] && [ "$metrics_saturated" != "true" ]; then
            status="passed"
            capacity_ok="true"
          else
            status="failed"
            capacity_ok="false"
          fi

          printf '{\n  "test_name": "%s",\n  "test_command": "%s",\n  "status": "%s",\n  "exit_code": %s,\n  "duration": %s,\n  "timestamp": "%s",\n  "fhe_params": "{{workflow.parameters.fhe-params}}",\n  "performance_metrics": {\n    "sustained_rate": %s\n  }\n}\n' \
            "$test_name" \
            "$test_command" \
            "$status" \
            "$test_exit" \
            "$duration" \
            "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            "$sustained_rate_metrics" \
            > /tmp/artifacts/${test_name}.json
          echo "$capacity_ok" > /tmp/artifacts/${test_name}.ok

          exit 0
        env: *core-client-env
        resources: *core-client-resources

    - name: summary-report
      inputs:
        parameters:
        - name: test-result-100
        - name: tls
        - name: run_url
        - name: duration
        - name: max-in-flight
      script:
        image: public.ecr.aws/docker/library/alpine:3.23
        command: ["/bin/sh", "-c"]
        env:
        - name: WORKFLOW_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['workflows.argoproj.io/workflow']
        volumeMounts:
        - name: slack-webhook-volume
          mountPath: /etc/slack
        source: |
          apk add --no-cache jq curl
          mkdir -p /mnt/results
          echo '{{inputs.parameters.test-result-100}}' > /mnt/results/sustained-rate-udec-100.json

          echo "=========================================="
          echo "KMS SUSTAINED UDEC RATE SUMMARY"
          echo "=========================================="
          echo "Report generated: $(date -u)"
          echo "Payload: {{workflow.parameters.batch-size}} x {{workflow.parameters.data-type}} per request"
          echo "FHE params: {{workflow.parameters.fhe-params}}"
          echo "Duration: {{inputs.parameters.duration}}s, max in-flight: {{inputs.parameters.max-in-flight}}"
          echo ""

          total=0
          passed=0
          failed=0
          skipped=0
          summary_lines=""

          for rate in 100; do
            result="/mnt/results/sustained-rate-udec-${rate}.json"
            if ! jq empty "$result" 2>/dev/null; then
              echo "Skipping invalid JSON file: $result"
              continue
            fi

            total=$((total + 1))
            test_name=$(jq -r '.test_name // "unknown"' "$result")
            status=$(jq -r '.status // empty' "$result")
            exit_code=$(jq -r '.exit_code // "1"' "$result")
            target_rate=$(jq -r '.performance_metrics.sustained_rate.target_rate // empty' "$result")
            offered=$(jq -r '.performance_metrics.sustained_rate.offered // empty' "$result")
            completed=$(jq -r '.performance_metrics.sustained_rate.completed // empty' "$result")
            failed_requests=$(jq -r '.performance_metrics.sustained_rate.failed // empty' "$result")
            shed=$(jq -r '.performance_metrics.sustained_rate.shed // empty' "$result")
            achieved_rate=$(jq -r '.performance_metrics.sustained_rate.achieved_rate // empty' "$result")
            saturated=$(jq -r '.performance_metrics.sustained_rate.saturated // empty' "$result")
            p50=$(jq -r '.performance_metrics.sustained_rate.latency_ms.p50 // empty' "$result")
            p95=$(jq -r '.performance_metrics.sustained_rate.latency_ms.p95 // empty' "$result")
            p99=$(jq -r '.performance_metrics.sustained_rate.latency_ms.p99 // empty' "$result")

            if [ "$status" = "skipped" ]; then
              skipped=$((skipped + 1))
              line="SKIP ${test_name}: skipped because a lower sustained udec rate failed"
            elif [ "$status" = "passed" ]; then
              passed=$((passed + 1))
              perf_info="target=${target_rate} req/s offered=${offered} completed=${completed} failed=${failed_requests} shed=${shed} achieved=${achieved_rate} req/s saturated=${saturated} p50=${p50}ms p95=${p95}ms p99=${p99}ms"
              line="PASS ${test_name}: ${perf_info}"
            else
              failed=$((failed + 1))
              perf_info="target=${target_rate} req/s offered=${offered} completed=${completed} failed=${failed_requests} shed=${shed} achieved=${achieved_rate} req/s saturated=${saturated} p50=${p50}ms p95=${p95}ms p99=${p99}ms"
              line="FAIL ${test_name}: ${perf_info}"
            fi

            echo "$line"
            summary_lines="${summary_lines}${line}\n"
          done

          if [ $total -gt 0 ]; then
            success_rate=$(( (passed * 100) / total ))
          else
            success_rate=0
          fi

          echo "----------------------------------------"
          echo "Total tests: $total"
          echo "Passed: $passed"
          echo "Failed: $failed"
          echo "Skipped: $skipped"
          echo "Success rate: $success_rate%"
          echo "=========================================="

          if [ $failed -gt 0 ]; then
            color="danger"
            title="KMS sustained udec rate test failed"
          else
            color="good"
            title="KMS sustained udec rate test passed"
          fi

          slack_webhook_url=$(cat /etc/slack/url)
          slack_text=$(printf "%b" "$summary_lines" | sed 's/"/\\"/g')
          slack_message=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "$color",
                "title": "$title",
                "fields": [
                  {
                    "title": "Environment",
                    "value": "kms-ci",
                    "short": true
                  },
                  {
                    "title": "Status",
                    "value": "$passed passed, $failed failed, $skipped skipped ($success_rate% success)",
                    "short": true
                  },
                  {
                    "title": "Config",
                    "value": "payload={{workflow.parameters.batch-size}} x {{workflow.parameters.data-type}} per request, fhe-params={{workflow.parameters.fhe-params}}, duration={{inputs.parameters.duration}}s, max-in-flight={{inputs.parameters.max-in-flight}}, TLS={{inputs.parameters.tls}}",
                    "short": false
                  },
                  {
                    "title": "Run ID",
                    "value": "$WORKFLOW_NAME",
                    "short": true
                  },
                  {
                    "title": "GH Run URL",
                    "value": "{{inputs.parameters.run_url}}",
                    "short": false
                  }
                ],
                "text": "\`\`\`\n$slack_text\n\`\`\`"
              }
            ]
          }
          EOF
          )

          curl -s -X POST -H "Content-type: application/json" -d "$slack_message" "$slack_webhook_url"

          if [ $failed -gt 0 ]; then
            exit 1
          fi

  # Credentials for pulling private registry images.
  imagePullSecrets:
  - name: registry-credentials
