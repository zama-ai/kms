{{- if and .Values.kmsInit.enabled .Values.kmsCore.nitroEnclave.enabled .Values.kmsCore.secondaryEnclave.enabled -}}
{{- $sec := .Values.kmsCore.secondaryEnclave }}
{{- $kmsInitName := printf "%s-dkg" (include "kmsInitJobName" .) }}
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: kms-threshold-init-job
    app.kubernetes.io/name: {{ $kmsInitName }}
  annotations:
    "helm.sh/hook-weight": "0"
    "helm.sh/hook": post-install,post-upgrade
  name: {{ $kmsInitName }}
spec:
  template:
    metadata:
      labels:
        app: kms-threshold-init-job
        app.kubernetes.io/name: {{ $kmsInitName }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: check-kms-cores
          image: {{ .Values.kubeUtils.image.name }}:{{ .Values.kubeUtils.image.tag }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "starting init process for secondary kms-cores to be ready to be initialized"
              kmsInitCount=0
              {{- if $sec.thresholdMode.peersList }}
              peerAddresses=({{ range $peer := $sec.thresholdMode.peersList }}{{ printf "%s:%d" $peer.host (int $sec.ports.client) | quote }} {{ end }})
              for peerAddress in "${peerAddresses[@]}"; do
                while true
                  do
                  grpc_health_probe -addr="${peerAddress}"
                  healthStatus=$?
                  if [ ${healthStatus} -eq 0 ]; then
                    echo "kms-core #${peerAddress} is already initialized"
                    kmsInitCount=$((kmsInitCount + 1))
                    break
                  fi
                  if [ ${healthStatus} -eq {{ len $sec.thresholdMode.peersList }} ]; then
                    echo "kms-core #${peerAddress} is reachable but not yet initialized"
                    break
                  fi;
                  echo "failed to connect to kms-core at ${peerAddress}, retrying"
                  sleep 1
                done
              done
              {{- end }}
              echo "all secondary kms-core peers have been reached"
              echo "${kmsInitCount}" > /mnt/kms-init-count
          volumeMounts:
            - name: kms-core-health
              mountPath: /mnt
      containers:
        - name: threshold-init
          image: {{ include "kmsSecondaryImageName" . }}:{{ include "kmsSecondaryImageTag" . }}
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              KMS_INIT_COUNT="$(cat /mnt/kms-init-count)"
              KMS_INIT_TIMEOUT_SECONDS={{ .Values.kmsInit.timeoutSeconds}}
              echo "${KMS_INIT_COUNT} secondary peers to initialize"
              timeout ${KMS_INIT_TIMEOUT_SECONDS} bin/kms-init --addresses
              {{- range $peer := $sec.thresholdMode.peersList }} {{ printf "http://%s:%d" $peer.host (int $sec.ports.client) }}{{ end }}
              exit $?
          volumeMounts:
            - name: kms-core-health
              mountPath: /mnt
              readOnly: true
      volumes:
        - name: kms-core-health
          emptyDir:
            medium: Memory
      restartPolicy: Never
      imagePullSecrets:
        - name: registry-credentials
      {{- with .Values.kmsInit.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kmsInit.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kmsInit.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
