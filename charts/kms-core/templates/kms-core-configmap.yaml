{{- if or .Values.kmsCore.enabled .Values.kmsGenCertAndKeys.enabled -}}
{{- $kmsCoreName := include "kmsCoreName" . }}
{{- $peersIDList := untilStep (include "kmsPeersStartID" . | int) (.Values.kmsPeers.count | add1 | int) 1  }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: kms-core
    app.kubernetes.io/name: {{ include "kmsCoreName" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-2"
  name: {{ include "kmsCoreName" . }}-config
data:
  aws.toml: |
    [aws]
    region = "${AWS_REGION}"
    {{- if .Values.minio.enabled }}
    s3_endpoint = "{{ .Values.minio.endpoint }}"
    {{- else }}
    role_arn = "${AWS_ROLE_ARN}"
    {{ end }}
  {{- /* Build a per-network descriptor dict and render each ConfigMap document
         once per network from the shared named templates in _helpers.tpl. The
         primary network descriptor: */}}
  {{- $primaryPublicPrefix := "" }}
  {{- if .Values.kmsCore.publicVault.s3.prefix }}{{ $primaryPublicPrefix = "${KMS_CORE__PUBLIC_VAULT__STORAGE__S3__PREFIX}" }}{{ end }}
  {{- $primaryPrivatePrefix := "" }}
  {{- if .Values.kmsCore.privateVault.s3.prefix }}{{ $primaryPrivatePrefix = "${KMS_CORE__PRIVATE_VAULT__STORAGE__S3__PREFIX}" }}{{ end }}
  {{- $primaryTlsMode := "manual" }}
  {{- if .Values.kmsCore.nitroEnclave.enabled }}{{ $primaryTlsMode = "auto" }}{{ end }}
  {{- $primary := dict
        "ctx" $
        "net" .Values.kmsCore
        "clientPort" .Values.kmsCore.ports.client
        "peerPort" .Values.kmsCore.ports.peer
        "metricsPort" .Values.kmsCore.ports.metrics
        "myId" "${KMS_CORE__THRESHOLD__MY_ID}"
        "serviceName" (include "kmsCoreName" .)
        "caPemPrefix" "KMS_CA_PEM_"
        "thresholdEnabled" .Values.kmsCore.thresholdMode.enabled
        "enclaveBootstrap" .Values.kmsCore.nitroEnclave.enabled
        "webIdentityTokenPort" .Values.kmsCore.nitroEnclave.webIdentityTokenPort
        "tlsMode" $primaryTlsMode
        "hasAutoPeersFallback" true
        "publicPrefix" $primaryPublicPrefix
        "privatePrefix" $primaryPrivatePrefix
        "keychainAwsKms" .Values.kmsCore.nitroEnclave.enabled
        "tlsSubjectId" .Values.kmsPeers.id
        "cpuCount" .Values.kmsCore.nitroEnclave.cpuCount
        "memoryGiB" .Values.kmsCore.nitroEnclave.memoryGiB
        "cid" .Values.kmsCore.nitroEnclave.cid
        "eifPath" .Values.kmsCore.nitroEnclave.eifPath
      }}
  vaults.toml: |
    {{- include "kms-core.vaultsToml" $primary | nindent 4 }}
  kms-gen-keys.toml: |
    {{- include "kms-core.genKeysToml" $primary | nindent 4 }}
  kms-server.toml: |
    {{- include "kms-core.serverToml" $primary | nindent 4 }}
  {{- if .Values.kmsCore.nitroEnclave.enabled }}
  enclave.json: |
    {{- include "kms-core.enclaveJson" $primary | nindent 4 }}
    {{- if .Values.kmsCore.thresholdMode.tls.enabled }}
  party_cert.pem: ${KMS_CA_PEM_{{ .Values.kmsPeers.id }}}
    {{- end }}
  {{- end }}
  {{- if and .Values.kmsCore.enabled .Values.kmsCore.nitroEnclave.enabled .Values.kmsCore.secondaryEnclave.enabled }}
  {{- /* Secondary (co-located shard) network descriptor. Reuses the same named
         templates with a distinct value subtree, ports, CA-pin prefix, service
         name and (optional) vault prefixes. */}}
  {{- $sec := .Values.kmsCore.secondaryEnclave }}
  {{- $secPublicPrefix := "" }}
  {{- if $sec.publicVault.s3.prefix }}{{ $secPublicPrefix = $sec.publicVault.s3.prefix }}{{ else if .Values.kmsCore.publicVault.s3.prefix }}{{ $secPublicPrefix = "${KMS_CORE__PUBLIC_VAULT__STORAGE__S3__PREFIX}" }}{{ end }}
  {{- $secPrivatePrefix := "" }}
  {{- if $sec.privateVault.s3.prefix }}{{ $secPrivatePrefix = $sec.privateVault.s3.prefix }}{{ else if .Values.kmsCore.privateVault.s3.prefix }}{{ $secPrivatePrefix = "${KMS_CORE__PRIVATE_VAULT__STORAGE__S3__PREFIX}" }}{{ end }}
  {{- $secMyId := "${KMS_CORE__THRESHOLD__MY_ID}" }}
  {{- if $sec.thresholdMode.myId }}{{ $secMyId = printf "%v" $sec.thresholdMode.myId }}{{ end }}
  {{- $secTlsSubjectId := default .Values.kmsPeers.id $sec.thresholdMode.myId }}
  {{- $secondary := dict
        "ctx" $
        "net" $sec
        "clientPort" $sec.ports.client
        "peerPort" $sec.ports.peer
        "metricsPort" $sec.ports.metrics
        "myId" $secMyId
        "serviceName" (include "kmsCoreSecondaryName" .)
        "caPemPrefix" "KMS_CA_PEM_DKG_"
        "thresholdEnabled" true
        "enclaveBootstrap" true
        "webIdentityTokenPort" $sec.nitroEnclave.webIdentityTokenPort
        "tlsMode" "auto"
        "hasAutoPeersFallback" false
        "publicPrefix" $secPublicPrefix
        "privatePrefix" $secPrivatePrefix
        "keychainAwsKms" true
        "tlsSubjectId" $secTlsSubjectId
        "cpuCount" $sec.nitroEnclave.cpuCount
        "memoryGiB" $sec.nitroEnclave.memoryGiB
        "cid" $sec.nitroEnclave.cid
        "eifPath" $sec.nitroEnclave.eifPath
      }}
  vaults-dkg.toml: |
    {{- include "kms-core.vaultsToml" $secondary | nindent 4 }}
  kms-server-dkg.toml: |
    {{- include "kms-core.serverToml" $secondary | nindent 4 }}
  enclave-dkg.json: |
    {{- include "kms-core.enclaveJson" $secondary | nindent 4 }}
  kms-gen-keys-dkg.toml: |
    {{- include "kms-core.genKeysToml" $secondary | nindent 4 }}
  {{- end }}
{{- end -}}
